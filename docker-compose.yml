version: '3.8'

services:
  fastapi:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./model:/app/model
    restart: always

  streamlit:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install streamlit requests plotly pillow &&
             streamlit run streamlit_app.py --server.port 8501
             --server.address 0.0.0.0"
    ports:
      - "8502:8501"
    depends_on:
      - fastapi
    restart: always